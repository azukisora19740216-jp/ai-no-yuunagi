name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: ainoyuunagi_test
          POSTGRES_USER: ainoyuunagi
          POSTGRES_PASSWORD: ci_only_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ainoyuunagi -d ainoyuunagi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      APP_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://ainoyuunagi:ci_only_password@127.0.0.1:5432/ainoyuunagi_test?schema=public
      TEST_DATABASE_URL: postgresql://ainoyuunagi:ci_only_password@127.0.0.1:5432/ainoyuunagi_test?schema=public
      AUTH_SECRET: ci-authentication-secret-for-tests-only-123456
      LOG_LEVEL: warn
      ALLOW_MOCK_ADAPTERS: "true"
      EMAIL_DRIVER: mock
      KYC_DRIVER: mock
      SHIPPING_DRIVER: mock
      STORAGE_DRIVER: local
      LOCAL_STORAGE_PATH: .local-data/uploads
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: "1025"
      MAIL_FROM: no-reply@example.invalid
      AUTH_RATE_LIMIT_WINDOW: "60"
      AUTH_RATE_LIMIT_MAX: "200"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:validate
      - run: pnpm db:deploy
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm build
        env:
          NODE_ENV: production
          AUTH_SECRET: ci-build-authentication-secret-123456789
          ALLOW_MOCK_ADAPTERS: "false"
          EMAIL_DRIVER: external
          KYC_DRIVER: external
          SHIPPING_DRIVER: external
          STORAGE_DRIVER: s3
          S3_ENDPOINT: http://127.0.0.1:9000
          S3_REGION: test
          S3_BUCKET: test
          S3_ACCESS_KEY_ID: test-only
          S3_SECRET_ACCESS_KEY: test-only

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    env:
      NODE_ENV: test
      APP_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://ainoyuunagi:ci_only_password@127.0.0.1:5432/ainoyuunagi_e2e?schema=public
      AUTH_SECRET: ci-e2e-authentication-secret-for-tests-12345
      E2E_FULL: "true"
      LOG_LEVEL: warn
      ALLOW_MOCK_ADAPTERS: "true"
      EMAIL_DRIVER: mock
      KYC_DRIVER: mock
      SHIPPING_DRIVER: mock
      STORAGE_DRIVER: local
      LOCAL_STORAGE_PATH: .local-data/uploads
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: "1025"
      MAIL_FROM: no-reply@example.invalid
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: ainoyuunagi_e2e
          POSTGRES_USER: ainoyuunagi
          POSTGRES_PASSWORD: ci_only_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ainoyuunagi -d ainoyuunagi_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:deploy
      - run: pnpm db:seed
      - run: pnpm build
        env:
          NODE_ENV: production
          AUTH_SECRET: ci-build-authentication-secret-123456789
          ALLOW_MOCK_ADAPTERS: "false"
          EMAIL_DRIVER: external
          KYC_DRIVER: external
          SHIPPING_DRIVER: external
          STORAGE_DRIVER: s3
          S3_ENDPOINT: http://127.0.0.1:9000
          S3_REGION: test
          S3_BUCKET: test
          S3_ACCESS_KEY_ID: test-only
          S3_SECRET_ACCESS_KEY: test-only
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
        env:
          E2E_FULL_POLICY: "true"
          FEATURE_PILOT_ENROLLMENT: "true"
          FEATURE_KYC_GATES: "true"
          KYC_DRIVER: external

  container:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target production --tag ai-no-yuunagi:${{ github.sha }} .
